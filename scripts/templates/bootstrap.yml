name: Bootstrap issues

# Reads context/foundation/discovery-notes.md and creates GitHub Issues
# for every Functional Requirement (FR-XXX).
# Uses gh CLI only — no API key required, GITHUB_TOKEN is enough.
# Safe to re-run — existing issues are skipped automatically.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print what would be created, no issues created"
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch issue creation script
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/spokospace/rs-flow-contexts/main/scripts/create-issues-from-spec.mjs" \
            -o create-issues-from-spec.mjs

      - name: Create issues from spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node create-issues-from-spec.mjs context/foundation/discovery-notes.md
