name: Bootstrap issues

# Reads context/foundation/discovery-notes.md and creates GitHub Issues
# for every Functional Requirement (FR-XXX), then creates a feature branch
# for each issue. Safe to re-run — claude-code-action will skip duplicates.

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Glob"
          prompt: |
            Read the file `context/foundation/discovery-notes.md`.

            For every Functional Requirement listed (lines matching `- FR-XXX:`):
            1. Create a GitHub Issue using `gh issue create` with:
               - title: "[FR-XXX] <short requirement title>"
               - body: the requirement description + priority from the spec
               - label: "enhancement" (create it if it doesn't exist)
            2. After creating the issue, get its number and create a branch:
               `git checkout -b feature/FR-XXX && git push origin feature/FR-XXX`

            Use the project glossary for consistent terminology.
            Do not create duplicate issues — check existing ones first with `gh issue list`.
            After finishing, print a summary table of created issues and branches.
