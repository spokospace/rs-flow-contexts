name: "[TEST] Bootstrap issues from discovery notes"

# Test workflow — parses FR-XXX requirements from a discovery-notes.md
# and creates GitHub Issues using gh CLI (GITHUB_TOKEN only, no API key).
# Safe to re-run — existing issues are skipped.

on:
  workflow_dispatch:
    inputs:
      context_file:
        description: "Path to discovery-notes.md (relative to repo root)"
        required: true
        default: "2026-06-05-meniu-qr-self-funded-startup/context/foundation/discovery-notes.md"
      dry_run:
        description: "Dry run — print what would be created, no issues created"
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create issues from spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/create-issues-from-spec.mjs "${{ inputs.context_file }}"
