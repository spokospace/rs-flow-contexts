name: Create issues from spec

# Tworzy GitHub Issues z pliku discovery-notes.md.
# Bezpieczne do wielokrotnego uruchamiania — istniejące issues są pomijane.
#
# Jak używać:
#   1. Przejdź do zakładki Actions → "Create issues from spec" → Run workflow
#   2. spec_file   — ścieżka do discovery-notes.md w tym repo
#                    (np. 2026-06-05-meniu-qr-self-funded-startup/context/foundation/discovery-notes.md)
#   3. target_repo — repo docelowe (owner/name), np. spokospace/meniu-qr
#                    Zostaw puste, aby tworzyć issues w tym repo.
#   4. dry_run     — true = podgląd, false = twórz naprawdę

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Ścieżka do discovery-notes.md (względem root tego repo)"
        required: true
        default: "2026-06-05-meniu-qr-self-funded-startup/context/foundation/discovery-notes.md"
      target_repo:
        description: "Docelowe repo dla issues (owner/name). Puste = to repo."
        type: string
        default: ""
      dry_run:
        description: "Dry run — tylko podgląd, bez tworzenia issues"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: create-issues-${{ inputs.target_repo || github.repository }}
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create issues from spec
        env:
          # Dla zewnętrznych repo: CLIENT_REPO_TOKEN lub ORG_REPO_TOKEN (PAT z prawem issues:write).
          # Dla tego repo: GITHUB_TOKEN wystarczy.
          GH_TOKEN: ${{ secrets.CLIENT_REPO_TOKEN || secrets.ORG_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/create-issues-from-spec.mjs "${{ inputs.spec_file }}"
