name: Create issues from spec

# Creates GitHub Issues from a discovery-notes.md file.
# Safe to re-run — existing issues are skipped.
#
# Usage:
#   1. Actions → "Create issues from spec" → Run workflow
#   2. spec_file   — path to discovery-notes.md in this repo
#   3. target_repo — target repo (owner/name), e.g. spokospace/meniu-qr
#                    Leave empty to create issues in this repo.
#   4. dry_run     — true = preview only, false = create for real

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Select discovery-notes.md file"
        type: choice
        # Add a new entry here when a new client folder is created.
        options:
          - 2026-06-05-meniu-qr-self-funded-startup/context/foundation/discovery-notes.md
          - context/discovery/discovery-notes.md
          - piekarnia/discovery/discovery-notes.md
      target_repo:
        description: "Target repo for issues (owner/name). Leave empty for this repo."
        type: string
        default: ""
      dry_run:
        description: "Dry run — preview only, no issues created"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: create-issues-${{ inputs.target_repo || github.repository }}
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from spec
        env:
          # External repos: CLIENT_REPO_TOKEN or ORG_REPO_TOKEN (PAT with issues:write).
          # This repo: GITHUB_TOKEN is sufficient.
          GH_TOKEN: ${{ secrets.CLIENT_REPO_TOKEN || secrets.ORG_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run }}
          SPEC_FILE: ${{ inputs.spec_file }}
        run: node scripts/create-issues-from-spec.mjs "$SPEC_FILE"
